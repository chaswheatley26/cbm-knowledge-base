{% raw %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CBM Knowledge Base</title>

<!--
  React, ReactDOM, Babel, and lucide-react are loaded dynamically further
  down (see the bootstrap script near the end of body), not as static tags
  here. Some "Custom HTML" host components re-inject pasted <script> tags
  programmatically rather than parsing them as a normal document, which can
  break the usual guarantee that head scripts finish loading, in order,
  before anything after them runs. Loading them from our own inline script
  with explicit load-event waiting sidesteps that entirely.
-->
  
<style>
  * { box-sizing: border-box; }
  html, body, #root { margin: 0; min-height: 100%; }
  .spin { animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .card:hover { border-color: #c3ccdd !important; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(20,30,60,0.07) !important; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: #2b3d6b !important; box-shadow: 0 0 0 3px rgba(43,61,107,0.14); }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="root">Loading…</div>

<!--
  The JSX source sits here as inert text (type="text/plain" so the browser
  never tries to execute it directly). The bootstrap script below reads it,
  compiles it with Babel using the CLASSIC JSX runtime, and runs the result.
  This matters: Babel's default "automatic" runtime compiles JSX into
  `import { jsx as _jsx } from "react/jsx-runtime"`, a real ES module import
  — which throws "Cannot use import statement outside a module" in a plain
  script and silently kills the whole app (this is what caused the page to
  hang on "Loading…" indefinitely). The classic runtime compiles to plain
  React.createElement(...) calls instead, which need no import at all.
-->
<script type="text/plain" id="app-source">
const { useState, useEffect, useCallback } = React;

/* -------------------------------------------------------------------------
   Lucide icons — loaded from CDN as window.lucideReact (UMD global). If the
   global name ever changes upstream, every icon below quietly falls back to
   rendering nothing rather than crashing the app, so this is worth a quick
   visual check the first time this loads for real: if icons are missing,
   the CDN global name is the first thing to check in devtools console
   (inspect `window.lucideReact` / `window.LucideReact`).
   ------------------------------------------------------------------------- */
const LR = window.lucideReact || window.LucideReact || {};
const NoIcon = () => null;
const Search = LR.Search || NoIcon;
const Plus = LR.Plus || NoIcon;
const X = LR.X || NoIcon;
const Loader2 = LR.Loader2 || NoIcon;
const CheckCircle2 = LR.CheckCircle2 || NoIcon;
const AlertCircle = LR.AlertCircle || NoIcon;
const BookOpen = LR.BookOpen || NoIcon;
const Tag = LR.Tag || NoIcon;
const HashIcon = LR.Hash || NoIcon;
const ChevronLeft = LR.ChevronLeft || NoIcon;
const Building2 = LR.Building2 || NoIcon;
const Sparkles = LR.Sparkles || NoIcon;

/* =========================================================================
   REWST WEBHOOKS — this UI talks to Rewst exclusively through these 4 calls.
   The page is deployed as a standalone file on GitHub Pages (a real origin,
   whitelisted directly on the Rewst triggers), which fixes the CORS-origin
   problem. However wait_for_results:true was found to respond with a 303
   redirect to a separate results endpoint that doesn't carry the same CORS
   headers — so CORS and wait_for_results are mutually exclusive regardless
   of origin. Triggers are back to wait_for_results:false: each call
   returns an execution_id immediately, and the real result is fetched by
   polling a status endpoint separately.

   No explicit Content-Type header is sent on either the trigger POST or
   the status-poll GET, on purpose: with a plain string body and no custom
   headers, the request stays CORS-"simple" and the browser skips the
   OPTIONS preflight entirely — Rewst's engine was previously seen
   rejecting that preflight outright. Rewst's receiver needs to parse the
   body as JSON from its raw content rather than relying on the
   Content-Type label; the raw response is logged at every step below, so
   if fields ever come through empty or unparsed, that's visible in the
   console immediately rather than guessed at.
   ========================================================================= */
// Bump this string every time a new version is shipped, so the visible
// header text alone confirms whether the latest paste is actually live —
// no devtools required.
const BUILD_TAG = "2026-07-07-14";

const WEBHOOKS = {
  search: "https://engine.rewst.io/webhooks/custom/trigger/019f3d3f-6058-7fc1-ac1b-ff0459453f45/01976967-f419-7877-9ff8-e4db81c148a6",
  submit: "https://engine.rewst.io/webhooks/custom/trigger/019f3d41-1b97-7c9b-a640-90428869b601/01976967-f419-7877-9ff8-e4db81c148a6",
  browse: "https://engine.rewst.io/webhooks/custom/trigger/019f3d42-9452-7181-b74d-9cd202860b1d/01976967-f419-7877-9ff8-e4db81c148a6",
  getRecord: "https://engine.rewst.io/webhooks/custom/trigger/019f3d43-ffa6-77f9-93ef-4f792a80d2a4/01976967-f419-7877-9ff8-e4db81c148a6",
};
const STATUS_URL_BASE = "https://engine.rewst.io/webhooks/custom/trigger/status/";
const POLL_INTERVAL_MS = 2000;
const POLL_TIMEOUT_MS = 30000;

function sleep(ms) {
  return new Promise((resolve) => setTimeout(resolve, ms));
}

// We don't have Rewst's documented shape for the status response, so this
// checks several plausible field names/values rather than betting on one,
// and logs the raw payload on EVERY poll (not just the final one) so the
// real shape is visible in the console the first time this runs live.
const STATUS_FIELD_NAMES = ["status", "state", "execution_status"];
const SUCCESS_VALUES = ["completed", "complete", "finished", "success", "succeeded"];
const FAILURE_VALUES = ["failed", "failure", "error", "cancelled", "canceled"];
const OUTPUT_KEYS = ["output", "result", "data", "workflow_output"];

function readStatusValue(data) {
  for (const field of STATUS_FIELD_NAMES) {
    if (data && data[field] !== undefined && data[field] !== null) {
      return String(data[field]).toLowerCase();
    }
  }
  return "";
}

function extractOutput(data) {
  for (const key of OUTPUT_KEYS) {
    if (data && data[key] !== undefined) return data[key];
  }
  return data;
}

async function pollExecution(executionId) {
  const start = Date.now();
  while (true) {
    if (Date.now() - start > POLL_TIMEOUT_MS) {
      throw new Error("This took longer than 30 seconds to complete. Please try again.");
    }
    // No custom headers here on purpose — see the top-of-file note on why.
    const res = await fetch(STATUS_URL_BASE + executionId, { method: "GET" });
    if (!res.ok) throw new Error(`Status check failed (${res.status})`);
    const rawText = await res.text();
    let data = {};
    if (rawText) {
      try {
        data = JSON.parse(rawText);
      } catch (e) {
        console.log("Rewst poll response for", executionId, "— non-JSON body:", rawText.slice(0, 300));
        await sleep(POLL_INTERVAL_MS);
        continue;
      }
    }
    console.log("Rewst poll response for", executionId, ":", data, "| raw:", JSON.stringify(rawText));
    const statusValue = readStatusValue(data);
    if (SUCCESS_VALUES.includes(statusValue)) {
      return extractOutput(data);
    }
    if (FAILURE_VALUES.includes(statusValue)) {
      throw new Error("The request failed while processing.");
    }
    await sleep(POLL_INTERVAL_MS);
  }
}

// POST to a webhook, then poll for its result. Reads the raw text first
// rather than assuming valid JSON, and checks a few plausible response
// headers in case the execution ID is sent there instead of in the body.
const EXECUTION_ID_HEADER_NAMES = ["x-execution-id", "execution-id", "x-rewst-execution-id", "location"];

function readExecutionIdFromHeaders(res) {
  for (const name of EXECUTION_ID_HEADER_NAMES) {
    const value = res.headers.get(name);
    if (value) {
      const parts = value.split("/").filter(Boolean);
      return parts.length ? parts[parts.length - 1] : value;
    }
  }
  return null;
}

async function callWebhook(url, body) {
  const res = await fetch(url, {
    method: "POST",
    body: JSON.stringify(body),
  });
  if (!res.ok && res.status !== 202) {
    throw new Error(`Request failed (${res.status})`);
  }

  const rawText = await res.text();
  console.log("Rewst webhook trigger response — status:", res.status, res.statusText);
  console.log("Rewst webhook trigger response — visible headers:", [...res.headers.entries()]);
  console.log("Rewst webhook trigger response — raw body:", JSON.stringify(rawText));

  let data = null;
  if (rawText) {
    try {
      data = JSON.parse(rawText);
    } catch (e) {
      throw new Error("The trigger response wasn't valid JSON: " + rawText.slice(0, 200));
    }
  }

  const executionId =
    (data && (data.execution_id || data.executionId || data.id)) ||
    readExecutionIdFromHeaders(res);

  if (!executionId) {
    throw new Error(
      rawText
        ? "No execution ID was found in the response body or headers."
        : "The trigger response body was completely empty, and no execution ID header was found either."
    );
  }
  return pollExecution(executionId);
}

async function searchTickets(query) {
  const output = await callWebhook(WEBHOOKS.search, { search_query: query });
  return (output && output.search_results) || [];
}
// Submit's own result body has nothing meaningful in it — success just
// means the execution reached "completed" without throwing.
async function submitTicket(rawText, sourceTicketId) {
  await callWebhook(WEBHOOKS.submit, { raw_ticket_text: rawText, source_ticket_id: sourceTicketId || "" });
  return true;
}
async function browseRecords(filterCompany, filterTicketType) {
  const output = await callWebhook(WEBHOOKS.browse, { filter_company: filterCompany || "", filter_ticket_type: filterTicketType || "" });
  return (output && output.records) || [];
}
// record always comes back as an array containing exactly one object.
async function getRecord(id) {
  const output = await callWebhook(WEBHOOKS.getRecord, { record_id: id });
  return (output && output.record && output.record[0]) || null;
}

/* ---------- small data helpers (resolution_steps / tags are plain strings) ---------- */
function splitSteps(v) {
  if (!v) return [];
  const s = String(v).trim();
  if (!s) return [];
  let parts = s.split(/\n+/).map((p) => p.trim()).filter(Boolean);
  if (parts.length > 1) return parts.map((p) => p.replace(/^\d+[.)]\s*/, ""));
  parts = s.split(/(?=\d+\.\s)/).map((p) => p.trim()).filter(Boolean);
  if (parts.length > 1) return parts.map((p) => p.replace(/^\d+\.\s*/, ""));
  return [s];
}
function splitTags(v) {
  if (!v) return [];
  const s = String(v).trim();
  if (!s) return [];
  let parts = s.split(/\n+/).map((p) => p.trim()).filter(Boolean);
  if (parts.length > 1) return parts;
  return s.split(/[,;]+/).map((p) => p.trim()).filter(Boolean);
}
function toText(v) {
  return v ? String(v) : "";
}
function autoGrow(e) {
  const el = e.target;
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 400) + "px";
}

/* ---------- CBM mark ---------- */
function CbmMark({ size = 26 }) {
  const NAVY = "#2b3d6b", GOLD = "#c9a938";
  return (
    <svg width={size} height={size} viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="CBM">
      <path d="M40 10 L66 10 Q70 10 69 14 L60 44 Q59 48 55 48 L29 48 Q25 48 26 44 L35 14 Q36 10 40 10 Z" fill={GOLD} />
      <path d="M58 40 L80 40 Q84 40 83 44 L72 86 Q71 90 67 90 L45 90 Q41 90 42 86 L53 44 Q54 40 58 40 Z" fill={NAVY} />
      <path d="M58 62 L74 68 L67 71 L72 80 L68 82 L63 73 L57 77 Z" fill="#fff" />
    </svg>
  );
}

// Scores are always 0–10 integers; anything below 4 is never returned by search.
function ConfidenceBadge({ score }) {
  if (score === null || score === undefined || score === "") return null;
  const num = typeof score === "number" ? score : parseFloat(score);
  if (Number.isNaN(num)) return null;
  const tier = num >= 8 ? "high" : num >= 5 ? "mid" : "low";
  const colors = {
    high: { bg: "#e6f4ec", fg: "#1b7a44" },   // 8-10 green
    mid: { bg: "#fdf0e3", fg: "#a85a16" },    // 5-7 amber
    low: { bg: "#eef1f7", fg: "#5a6479" },    // 4 grey
  };
  const c = colors[tier];
  return <span style={{ ...styles.pill, background: c.bg, color: c.fg }}>{num}/10 match</span>;
}

function Section({ label, children }) {
  return <div style={styles.section}><div style={styles.sectionLabel}>{label}</div>{children}</div>;
}
function Field({ label, children }) {
  return <div style={styles.field}><label style={styles.fieldLabel}>{label}</label>{children}</div>;
}

/* ================================ SEARCH ================================ */
function SearchPage({ onOpenDetail }) {
  const [query, setQuery] = useState("");
  const [busy, setBusy] = useState(false);
  const [results, setResults] = useState(null);
  const [error, setError] = useState("");

  async function runSearch() {
    if (!query.trim() || busy) return;
    setBusy(true); setError(""); setResults(null);
    try {
      const r = await searchTickets(query.trim());
      setResults(r);
    } catch (e) {
      setError("Couldn't reach the knowledge base search: " + (e && e.message ? e.message : "unknown error"));
    }
    setBusy(false);
  }

  return (
    <div style={styles.heroWrap}>
      <div style={styles.greeting}><CbmMark size={30} /> <span>Search resolved tickets</span></div>
      <div style={styles.bigBox}>
        <textarea
          style={styles.bigInput}
          rows={2}
          value={query}
          onChange={(e) => setQuery(e.target.value)}
          onInput={autoGrow}
          placeholder="Describe the problem — e.g. “VPN drops every 40 minutes on SonicWall”"
          onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); runSearch(); } }}
          autoFocus
        />
        <div style={styles.bigBoxFoot}>
          <span style={styles.bigBoxHint}>{busy ? "Searching… this can take up to 30 seconds" : "Press Enter to search"}</span>
          <button
            style={{ ...styles.sendBtn, opacity: query.trim() && !busy ? 1 : 0.5, cursor: query.trim() && !busy ? "pointer" : "not-allowed" }}
            onClick={runSearch}
            disabled={!query.trim() || busy}
          >
            {busy ? <Loader2 size={17} className="spin" /> : <Search size={17} />}
          </button>
        </div>
      </div>

      {error && <div style={styles.errorBox}><AlertCircle size={15} /> {error}</div>}

      {results && (
        results.length === 0 ? (
          <div style={styles.noMatch}>
            <div style={styles.noMatchTitle}>No matches yet</div>
            <p style={styles.noMatchText}>Nothing in the knowledge base closely matches that. Try different symptoms or the exact error text.</p>
          </div>
        ) : (
          <div style={{ marginTop: 24 }}>
            <div style={styles.resultsHead}>{results.length} match{results.length === 1 ? "" : "es"}</div>
            <div style={styles.list}>
              {results.map((r) => (
                <button key={r.id} style={styles.card} className="card" onClick={() => onOpenDetail(r.id, "search")}>
                  <div style={styles.cardTop}>
                    <span style={styles.cardTitle}>{r.problem_summary}</span>
                    <ConfidenceBadge score={r.relevance_score} />
                  </div>
                  <div style={styles.cardMeta}>
                    {r.company && <span style={styles.metaTag}><Building2 size={12} /> {r.company}</span>}
                    {r.ticket_type && <span style={styles.metaTag}><Tag size={12} /> {r.ticket_type}</span>}
                  </div>
                  {r.relevance_reason && <p style={styles.cardPreview}>{r.relevance_reason}</p>}
                </button>
              ))}
            </div>
          </div>
        )
      )}
    </div>
  );
}

/* ================================ SUBMIT ================================ */
function SubmitPage() {
  const [raw, setRaw] = useState("");
  const [sourceId, setSourceId] = useState("");
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState("");
  const [done, setDone] = useState(false);

  async function run() {
    if (!raw.trim() || busy) return;
    setBusy(true); setError(""); setDone(false);
    try {
      await submitTicket(raw.trim(), sourceId.trim());
      setDone(true);
      setRaw(""); setSourceId("");
    } catch (e) {
      setError("Couldn't save this ticket: " + (e && e.message ? e.message : "unknown error"));
    }
    setBusy(false);
  }

  return (
    <div style={styles.heroWrap}>
      <h1 style={styles.heroTitle}>Add a solved ticket</h1>
      <p style={styles.heroSub}>Paste the full resolved ticket. Claude reads it, pulls out the problem and fix, and saves it to IT Glue for the whole team.</p>

      <div style={styles.pasteCard}>
        <Field label="Ticket # (optional)">
          <input style={styles.input} value={sourceId} onChange={(e) => setSourceId(e.target.value)} placeholder="e.g. 12345" />
        </Field>
        <div style={{ marginTop: 16 }}>
          <label style={styles.fieldLabel}>Raw ticket text</label>
          <textarea
            style={{ ...styles.textarea, minHeight: 220, fontFamily: "ui-monospace, monospace", fontSize: 13, marginTop: 7 }}
            rows={12}
            value={raw}
            onChange={(e) => setRaw(e.target.value)}
            placeholder="Paste the full ticket text here…"
          />
        </div>

        {error && <div style={styles.errorBox}><AlertCircle size={15} /> {error}</div>}
        {done && (
          <div style={styles.successBox}>
            <CheckCircle2 size={16} /> Saved to the knowledge base.
          </div>
        )}

        <button
          style={{ ...styles.primaryBtn, marginTop: 14, opacity: raw.trim() && !busy ? 1 : 0.5, cursor: raw.trim() && !busy ? "pointer" : "not-allowed" }}
          onClick={run}
          disabled={!raw.trim() || busy}
        >
          {busy ? <><Loader2 size={16} className="spin" /> Saving to IT Glue… (up to 30s)</> : <><Sparkles size={16} /> Parse &amp; save</>}
        </button>
      </div>
    </div>
  );
}

/* ================================ BROWSE ================================ */
function BrowsePage({ onOpenDetail }) {
  const [company, setCompany] = useState("");
  const [ticketType, setTicketType] = useState("");
  const [q, setQ] = useState("");
  const [records, setRecords] = useState([]);
  const [companies, setCompanies] = useState([]);
  const [types, setTypes] = useState([]);
  const [busy, setBusy] = useState(true);
  const [error, setError] = useState("");

  const load = useCallback(async (companyF, typeF) => {
    setBusy(true); setError("");
    try {
      const recs = await browseRecords(companyF, typeF);
      setRecords(recs);
      if (!companyF && !typeF) {
        setCompanies([...new Set(recs.map((r) => r.company).filter(Boolean))].sort());
        setTypes([...new Set(recs.map((r) => r.ticket_type).filter(Boolean))].sort());
      }
    } catch (e) {
      setError("Couldn't load the knowledge base: " + (e && e.message ? e.message : "unknown error"));
    }
    setBusy(false);
  }, []);

  useEffect(() => { load("", ""); }, [load]);

  function selectCompany(c) { setCompany(c); load(c, ticketType); }
  function selectType(t) { setTicketType(t); load(company, t); }

  const ql = q.trim().toLowerCase();
  // tags is a plain string on each record, so it's included as-is rather than joined from an array.
  const shown = ql
    ? records.filter((r) => `${r.problem_summary} ${r.company} ${r.ticket_type} ${r.tags || ""}`.toLowerCase().includes(ql))
    : records;

  return (
    <div>
      <div style={styles.dbHead}>
        <h1 style={styles.dbTitle}>Knowledge base</h1>
        <span style={styles.dbCount}>{records.length} entr{records.length === 1 ? "y" : "ies"}</span>
      </div>

      <div style={styles.dbSearchBox}>
        <Search size={17} style={{ color: "#7a8499", flexShrink: 0 }} />
        <input style={styles.dbSearchInput} placeholder="Filter loaded results by keyword or tag…" value={q} onChange={(e) => setQ(e.target.value)} />
        {q && <button style={styles.clearBtn} onClick={() => setQ("")}><X size={15} /></button>}
      </div>

      <div style={styles.filterRow}>
        <button onClick={() => selectCompany("")} style={{ ...styles.chip, ...(company === "" ? styles.chipActive : {}) }}>All companies</button>
        {companies.map((c) => (
          <button key={c} onClick={() => selectCompany(c)} style={{ ...styles.chip, ...(company === c ? styles.chipActive : {}) }}>{c}</button>
        ))}
      </div>
      <div style={styles.filterRow}>
        <button onClick={() => selectType("")} style={{ ...styles.chip, ...(ticketType === "" ? styles.chipActive : {}) }}>All types</button>
        {types.map((t) => (
          <button key={t} onClick={() => selectType(t)} style={{ ...styles.chip, ...(ticketType === t ? styles.chipActive : {}) }}>{t}</button>
        ))}
      </div>

      {error && <div style={styles.errorBox}><AlertCircle size={15} /> {error}</div>}

      {busy ? (
        <div style={styles.centerCol}><Loader2 size={22} className="spin" /><span style={styles.centerHint}>Loading… this can take up to 30 seconds</span></div>
      ) : shown.length === 0 ? (
        <div style={styles.noMatch}>
          <div style={styles.noMatchTitle}>Nothing here yet</div>
          <p style={styles.noMatchText}>No entries match this filter.</p>
        </div>
      ) : (
        <div style={styles.list}>
          {shown.map((r) => (
            <button key={r.id} style={styles.card} className="card" onClick={() => onOpenDetail(r.id, "browse")}>
              <div style={styles.cardTop}><span style={styles.cardTitle}>{r.problem_summary}</span></div>
              <div style={styles.cardMeta}>
                {r.company && <span style={styles.metaTag}><Building2 size={12} /> {r.company}</span>}
                {r.ticket_type && <span style={styles.metaTag}><Tag size={12} /> {r.ticket_type}</span>}
                {r.source_ticket_id && <span style={styles.metaTagFaint}><HashIcon size={11} /> {r.source_ticket_id}</span>}
              </div>
              {splitTags(r.tags).length > 0 && (
                <div style={styles.cardMeta}>
                  {splitTags(r.tags).map((t) => <span key={t} style={styles.metaTagFaint}>#{t}</span>)}
                </div>
              )}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

/* ================================ DETAIL ================================ */
function DetailView({ id, onBack }) {
  const [record, setRecord] = useState(null);
  const [busy, setBusy] = useState(true);
  const [error, setError] = useState("");

  useEffect(() => {
    let cancelled = false;
    (async () => {
      setBusy(true); setError("");
      try {
        const r = await getRecord(id);
        if (!cancelled) setRecord(r);
      } catch (e) {
        if (!cancelled) setError("Couldn't load this record: " + (e && e.message ? e.message : "unknown error"));
      }
      if (!cancelled) setBusy(false);
    })();
    return () => { cancelled = true; };
  }, [id]);

  const steps = record ? splitSteps(record.resolution_steps) : [];
  const tags = record ? splitTags(record.tags) : [];

  return (
    <div>
      <button style={styles.backBtn} onClick={onBack}><ChevronLeft size={16} /> Back</button>

      {busy && <div style={styles.centerCol}><Loader2 size={22} className="spin" /><span style={styles.centerHint}>Loading… this can take up to 30 seconds</span></div>}
      {error && <div style={styles.errorBox}><AlertCircle size={15} /> {error}</div>}

      {record && !busy && (
        <div style={styles.detailCard}>
          <div style={styles.detailHead}>
            <h2 style={styles.detailTitle}>{record.problem_summary}</h2>
          </div>
          <div style={styles.detailMeta}>
            {record.company && <span style={styles.metaTag}><Building2 size={12} /> {record.company}</span>}
            {record.ticket_type && <span style={styles.metaTag}><Tag size={12} /> {record.ticket_type}</span>}
            {record.source_ticket_id && <span style={styles.metaTagFaint}><HashIcon size={11} /> {record.source_ticket_id}</span>}
          </div>

          <Section label="Resolution steps">
            {steps.length > 0 ? (
              <ol style={styles.stepsList}>
                {steps.map((s, i) => <li key={i} style={styles.stepItem}>{s}</li>)}
              </ol>
            ) : (
              <p style={styles.bodyTextMuted}>No steps recorded.</p>
            )}
          </Section>

          {record.affected_systems && (
            <Section label="Affected systems"><p style={styles.bodyTextMuted}>{toText(record.affected_systems)}</p></Section>
          )}
          {record.error_messages && (
            <Section label="Error messages"><pre style={styles.summaryText}>{toText(record.error_messages)}</pre></Section>
          )}
          {tags.length > 0 && (
            <Section label="Tags">
              <div style={styles.cardMeta}>{tags.map((t) => <span key={t} style={styles.metaTag}>#{t}</span>)}</div>
            </Section>
          )}
        </div>
      )}
    </div>
  );
}

/* ================================= APP ================================= */
function App() {
  const [page, setPage] = useState("search");
  const [detail, setDetail] = useState(null); // { id, from }

  function openDetail(id, from) { setDetail({ id, from }); }
  function closeDetail() { setPage(detail.from); setDetail(null); }
  function go(p) { setDetail(null); setPage(p); }

  return (
    <div style={styles.page}>
      <header style={styles.header}>
        <div style={styles.headerInner}>
          <div style={styles.brand} onClick={() => go("search")} role="button">
            <div style={styles.logoMark}><CbmMark size={26} /></div>
            <div>
              <div style={styles.brandName}>CBM Knowledge Base</div>
              <div style={styles.brandSub}>Resolved ticket search · build {BUILD_TAG}</div>
            </div>
          </div>
          <nav style={styles.navTabs}>
            <button style={{ ...styles.navTab, ...(page === "search" && !detail ? styles.navTabActive : {}) }} onClick={() => go("search")}>
              <Search size={15} /> Search
            </button>
            <button style={{ ...styles.navTab, ...(page === "submit" && !detail ? styles.navTabActive : {}) }} onClick={() => go("submit")}>
              <Plus size={15} /> Submit
            </button>
            <button style={{ ...styles.navTab, ...(page === "browse" && !detail ? styles.navTabActive : {}) }} onClick={() => go("browse")}>
              <BookOpen size={15} /> Browse
            </button>
          </nav>
        </div>
      </header>

      <main style={styles.main}>
        {detail ? (
          <DetailView id={detail.id} onBack={closeDetail} />
        ) : page === "search" ? (
          <SearchPage onOpenDetail={openDetail} />
        ) : page === "submit" ? (
          <SubmitPage />
        ) : (
          <BrowsePage onOpenDetail={openDetail} />
        )}
      </main>
    </div>
  );
}

<script>
  function showFatal(msg) {
    document.getElementById("root").innerHTML =
      '<pre style="padding:24px;color:#b4271e;white-space:pre-wrap;font-family:ui-monospace,monospace;">' +
      String(msg).replace(/</g, "&lt;") +
      "</pre>";
  }

  function loadScript(src) {
    return new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = src;
      s.crossOrigin = "anonymous";
      s.onload = () => resolve();
      s.onerror = () => reject(new Error("Failed to load: " + src));
      document.head.appendChild(s);
    });
  }

  (async function boot() {
    try {
      await loadScript("https://unpkg.com/react@18/umd/react.production.min.js");
      await loadScript("https://unpkg.com/react-dom@18/umd/react-dom.production.min.js");
      await loadScript("https://unpkg.com/@babel/standalone/babel.min.js");
      // lucide-react's UMD wrapper looks for a lowercase window.react global.
      window.react = window.react || window.React;
      await loadScript("https://unpkg.com/lucide-react@0.383.0/dist/umd/lucide-react.min.js");
    } catch (err) {
      showFatal("Couldn't load a required script.\n\n" + err.message + "\n\nIf this is happening inside Rewst App Builder, check whether unpkg.com is reachable from inside the Custom HTML component (it may be blocked by a content security policy).");
      console.error(err);
      return;
    }

    if (typeof React === "undefined" || typeof ReactDOM === "undefined" || typeof Babel === "undefined") {
      showFatal("A required library didn't finish loading (React, ReactDOM, or Babel is missing after load).");
      return;
    }

    const source = document.getElementById("app-source").textContent;
    let compiled;
    try {
      compiled = Babel.transform(source, {
        presets: [["react", { runtime: "classic" }]],
      }).code;
    } catch (err) {
      showFatal("Failed to compile the app:\n\n" + err.message);
      console.error("Babel compile error:", err);
      return;
    }

    try {
      const runner = document.createElement("script");
      runner.textContent = compiled;
      document.body.appendChild(runner);
    } catch (err) {
      showFatal("App crashed while starting:\n\n" + err.message);
      console.error(err);
    }
  })();
</script>
